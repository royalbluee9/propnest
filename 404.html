<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — PropNest</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e2e2f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .icon { font-size: 5rem; margin-bottom: 16px; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    p  { color: #9898b3; font-size: 1.05rem; margin-bottom: 32px; }
    a  {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #7c5cfc, #a78bfa);
      color: #fff;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
  </style>
  <!-- Redirect after 5 seconds -->
  <meta http-equiv="refresh" content="5; url=/" />
</head>
<body>
  <div class="icon">🏚️</div>
  <h1>Oops — Page Not Found</h1>
  <p>This page doesn't exist. You'll be redirected to PropNest shortly…</p>
  <a href="/">← Back to PropNest</a>
</body>
</html>
